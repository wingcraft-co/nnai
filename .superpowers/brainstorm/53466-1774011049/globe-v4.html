<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로딩 컴포넌트 v4</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #111318;
  font-family: 'Segoe UI', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 40px;
  padding: 50px 20px;
  color: #eee;
}
h2 { font-size:1.4rem; font-weight:700; text-align:center; }
.sub { font-size:0.85rem; color:#666; text-align:center; margin-top:6px; }

/* 큰 데모 */
.stage {
  position:relative; width:380px; height:240px;
  border-radius:20px; overflow:hidden;
  border:1px solid #222;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5);
}
.app-bg {
  position:absolute; inset:0;
  background:#1c1f2e;
  padding:20px; display:flex; flex-direction:column; gap:10px;
}
.mbar { height:10px; border-radius:5px; background:#2a2f45; }
.mbar.h24{height:24px;} .mbar.w35{width:35%;} .mbar.w55{width:55%;}
.mbar.w70{width:70%;} .mbar.w90{width:90%;} .mbar.w100{width:100%;}
.ov {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  background:rgba(18,20,35,0.52);
  backdrop-filter:blur(7px);
}

/* 확대 뷰 */
.zoom-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
.zoom-label { font-size:0.8rem; color:#555; letter-spacing:0.08em; }
canvas { display:block; image-rendering: pixelated; }
</style>
</head>
<body>

<div>
  <h2>ㅅ 캐릭터 + 사실적인 지구본</h2>
  <p class="sub">오버레이 C 스타일 적용</p>
</div>

<!-- 메인 데모 -->
<div class="stage">
  <div class="app-bg">
    <div class="mbar h24 w55"></div>
    <div class="mbar w100"></div><div class="mbar w90"></div>
    <div class="mbar w70"></div><div class="mbar w100"></div>
    <div class="mbar w55"></div><div class="mbar w90"></div>
    <div class="mbar w35"></div><div class="mbar w100"></div>
  </div>
  <div class="ov">
    <canvas id="main-cv" width="90" height="110"></canvas>
  </div>
</div>

<!-- 확대 뷰 -->
<div class="zoom-wrap">
  <p class="zoom-label">캐릭터 확대 (픽셀 원본 × 8)</p>
  <canvas id="zoom-cv" width="192" height="128"></canvas>
</div>

<script>
// ── ㅅ 캐릭터 픽셀 (6col × 8row) ─────────────────────────────────────
// 색상
const Y = '#FFE082';   // 노란 몸통
const D = '#F9A825';   // 어두운 테두리/그림자
const K = '#2C1A00';   // 눈(검정)
const T = null;

// 상체 (row 0~5) — 앞을 바라보는 귀여운 얼굴 + ㅅ 허리
const BODY = [
//  0  1  2  3  4  5
  [ T, T, Y, Y, T, T],   // 0 머리 꼭대기
  [ T, Y, Y, Y, Y, T],   // 1 머리
  [ Y, Y, K, Y, K, Y],   // 2 눈 두 개 (K=눈동자)
  [ Y, Y, Y, Y, Y, Y],   // 3 얼굴 하단
  [ T, Y, Y, Y, Y, T],   // 4 턱
  [ T, T, Y, Y, T, T],   // 5 목 — ㅅ의 꼭짓점
];

// 다리 4프레임 — ㅅ 모양 다리가 좌우로 걷기
// 왼쪽 방향으로 이동하므로 왼다리(col0-1) ↔ 오른다리(col4-5) 교대
const LEGS = [
  // frame 0: 왼발 앞으로 (stride A)
  [[ Y, T, T, T, T, Y],   // row 6: ㅅ 다리 (왼=앞/낮게, 오른=뒤/높게)
   [ Y, T, T, T, Y, T]],  // row 7: 왼발 착지, 오른발 들림

  // frame 1: 발 모임 (mid)
  [[ T, Y, Y, Y, T, T],   // row 6
   [ T, Y, T, Y, T, T]],  // row 7

  // frame 2: 오른발 앞으로 (stride B)
  [[ Y, T, T, T, T, Y],   // row 6 (같은 ㅅ 형태, 반대 박자)
   [ T, Y, T, T, T, Y]],  // row 7: 오른발 착지, 왼발 들림

  // frame 3: 발 모임 (mid)
  [[ T, Y, Y, Y, T, T],   // row 6
   [ T, Y, T, Y, T, T]],  // row 7
];

// 프레임별 상체 Y 오프셋 (발 모임 = 살짝 내려감)
const BOB = [0, 1, 0, 1];

function drawChar(ctx, ox, oy, sc, frame) {
  const f = frame & 3;
  const bobY = BOB[f] * sc;
  const allRows = [...BODY, ...LEGS[f]];

  for (let r = 0; r < allRows.length; r++) {
    const isLeg = r >= BODY.length;
    const baseY = isLeg ? 0 : bobY; // 다리는 고정, 몸통만 bob

    for (let c = 0; c < allRows[r].length; c++) {
      const col = allRows[r][c];
      if (!col) continue;

      ctx.fillStyle = col;
      ctx.fillRect(ox + c*sc, oy + r*sc + baseY, sc, sc);

      // 하단 그림자 픽셀
      if (col === Y) {
        ctx.fillStyle = D;
        ctx.fillRect(ox + c*sc, oy + r*sc + baseY + sc - 1, sc, 1);
      }
    }
  }
}

// ── 지구 (v3과 동일) ──────────────────────────────────────────────────
function drawEarth(ctx, cx, cy, r, angle) {
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.clip();

  const og = ctx.createLinearGradient(cx, cy-r, cx, cy+r);
  og.addColorStop(0.0,  '#0B2D6E');
  og.addColorStop(0.25, '#1565C0');
  og.addColorStop(0.50, '#1E88E5');
  og.addColorStop(0.75, '#1565C0');
  og.addColorStop(1.0,  '#0B2D6E');
  ctx.fillStyle = og;
  ctx.fillRect(cx-r, cy-r, r*2, r*2);

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);

  function S(x, y) { return [x*r, y*r]; }
  function land(pts, fill) {
    ctx.fillStyle = fill;
    ctx.beginPath();
    ctx.moveTo(...S(...pts[0]));
    for (let i = 1; i+2 < pts.length; i += 3)
      ctx.bezierCurveTo(...S(...pts[i]), ...S(...pts[i+1]), ...S(...pts[i+2]));
    ctx.closePath();
    ctx.fill();
  }

  land([[ 0.02,-0.55],[ 0.20,-0.68],[ 0.50,-0.62],[ 0.72,-0.42],[ 0.82,-0.25],[ 0.78, 0.02],[ 0.60, 0.08],[ 0.45, 0.15],[ 0.30, 0.10],[ 0.15, 0.12],[ 0.05, 0.12],[-0.05, 0.08],[-0.15,-0.02],[-0.18,-0.18],[-0.15,-0.38],[-0.05,-0.48],[-0.03,-0.50],[ 0.00,-0.52],[ 0.02,-0.55]], '#43A047');
  land([[ 0.02,-0.12],[ 0.18,-0.14],[ 0.25,-0.05],[ 0.28, 0.12],[ 0.30, 0.28],[ 0.24, 0.50],[ 0.12, 0.58],[ 0.04, 0.62],[-0.07, 0.55],[-0.12, 0.42],[-0.14, 0.28],[-0.12, 0.10],[-0.04,-0.02],[ 0.00,-0.08],[ 0.01,-0.10],[ 0.02,-0.12]], '#388E3C');
  land([[-0.28,-0.62],[-0.10,-0.68],[-0.05,-0.58],[-0.12,-0.45],[-0.14,-0.32],[-0.20,-0.20],[-0.28,-0.12],[-0.36,-0.05],[-0.42,-0.10],[-0.44,-0.22],[-0.48,-0.38],[-0.52,-0.52],[-0.46,-0.62],[-0.40,-0.66],[-0.32,-0.65],[-0.28,-0.62]], '#4CAF50');
  land([[-0.32, 0.08],[-0.22, 0.06],[-0.20, 0.14],[-0.24, 0.28],[-0.26, 0.42],[-0.32, 0.58],[-0.40, 0.62],[-0.46, 0.58],[-0.48, 0.45],[-0.44, 0.30],[-0.40, 0.18],[-0.40, 0.10],[-0.32, 0.08]], '#388E3C');
  land([[ 0.44, 0.20],[ 0.56, 0.18],[ 0.64, 0.28],[ 0.60, 0.40],[ 0.55, 0.48],[ 0.44, 0.50],[ 0.36, 0.44],[ 0.30, 0.38],[ 0.32, 0.26],[ 0.44, 0.20]], '#558B2F');
  land([[-0.18,-0.72],[-0.08,-0.75],[ 0.00,-0.70],[-0.04,-0.62],[-0.10,-0.60],[-0.20,-0.65],[-0.18,-0.72]], '#C8E6C9');

  ctx.fillStyle = 'rgba(220,240,255,0.82)';
  ctx.beginPath(); ctx.ellipse(0, r*0.88, r*0.58, r*0.16, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(220,240,255,0.70)';
  ctx.beginPath(); ctx.ellipse(0, -r*0.84, r*0.38, r*0.12, 0, 0, Math.PI*2); ctx.fill();

  ctx.restore();

  const shine = ctx.createRadialGradient(cx-r*0.35, cy-r*0.38, 0, cx, cy, r);
  shine.addColorStop(0, 'rgba(255,255,255,0.18)');
  shine.addColorStop(0.5, 'rgba(200,230,255,0.04)');
  shine.addColorStop(1, 'rgba(0,30,100,0.28)');
  ctx.fillStyle = shine;
  ctx.fillRect(cx-r, cy-r, r*2, r*2);

  ctx.restore();

  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(130,200,255,0.45)';
  ctx.lineWidth = 1.2;
  ctx.stroke();
}

// ── 렌더 ───────────────────────────────────────────────────────────────
let angle = 0, tick = 0, wf = 0;

function render(canvas, gr, cs) {
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const cx = canvas.width / 2;
  const cy = canvas.height - gr - 4;
  drawEarth(ctx, cx, cy, gr, angle);
  // 캐릭터: 6 cols × 8 rows
  const charX = cx - 3*cs;
  const charY = cy - gr - 8*cs;
  drawChar(ctx, charX, charY, cs, wf);
}

// 확대용 — 지구 없이 캐릭터만 크게
function renderZoom(canvas, sc) {
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 4프레임 나란히 표시
  const frames = [0, 1, 2, 3];
  frames.forEach((f, i) => {
    const ox = i * (6*sc + 8) + 8;
    const oy = 8;
    drawChar(ctx, ox, oy, sc, f);

    // 프레임 번호
    ctx.fillStyle = '#444';
    ctx.font = `${sc}px monospace`;
    ctx.fillText('F' + f, ox, oy + 8*sc + sc + 4);
  });
}

function loop() {
  angle -= 0.013;
  tick++;
  if (tick % 10 === 0) wf++;

  render(document.getElementById('main-cv'), 36, 5);
  renderZoom(document.getElementById('zoom-cv'), 12);

  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
