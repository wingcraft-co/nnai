<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로딩 컴포넌트 v3</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #111318;
  font-family: 'Segoe UI', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 36px;
  padding: 40px 20px;
  color: #eee;
}
h2 { font-size:1.4rem; font-weight:700; text-align:center; }
.sub { font-size:0.85rem; color:#666; text-align:center; margin-top:5px; }
.stage {
  position: relative;
  width: 360px; height: 220px;
  border-radius: 18px; overflow: hidden;
  border: 1px solid #222;
}
.app-bg {
  position:absolute; inset:0;
  background:#1c1f2e;
  padding:18px;
  display:flex; flex-direction:column; gap:9px;
}
.mbar { height:10px; border-radius:5px; background:#2a2f45; }
.mbar.h22{height:22px;} .mbar.w35{width:35%;} .mbar.w55{width:55%;}
.mbar.w70{width:70%;} .mbar.w90{width:90%;} .mbar.w100{width:100%;}
.ov-wrap { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
.ov-row { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; }
.ov-card {
  cursor:pointer; width:150px;
  border:2px solid #252535; border-radius:12px;
  overflow:hidden; background:#181820;
  transition:all 0.18s;
}
.ov-card:hover { border-color:#5555aa; transform:translateY(-3px); }
.ov-card.selected { border-color:#8888ff; box-shadow:0 0 0 3px rgba(140,140,255,0.2); }
.ov-preview { height:90px; position:relative; overflow:hidden; }
.ov-appbg {
  position:absolute; inset:0;
  background:#1c1f2e; padding:10px;
  display:flex; flex-direction:column; gap:6px;
}
.mb2 { height:8px; border-radius:4px; background:#2a2f45; }
.mb2.w60{width:60%;} .mb2.w80{width:80%;} .mb2.w45{width:45%;}
.ov-layer { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
.ov-label { padding:10px 12px; }
.ov-label strong { display:block; font-size:0.83rem; color:#ddd; margin-bottom:3px; }
.ov-label span { font-size:0.76rem; color:#777; line-height:1.4; }
.sec-title { font-size:0.75rem; color:#555; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:-20px; }
</style>
</head>
<body>

<div>
  <h2>수정된 버전 확인</h2>
  <p class="sub">사실적인 지구본 + 귀여운 핑크 캐릭터 (왼쪽으로 걷기)</p>
</div>

<div class="stage">
  <div class="app-bg">
    <div class="mbar h22 w55"></div>
    <div class="mbar w100"></div><div class="mbar w90"></div>
    <div class="mbar w70"></div><div class="mbar w100"></div>
    <div class="mbar w55"></div><div class="mbar w90"></div>
    <div class="mbar w35"></div><div class="mbar w100"></div>
  </div>
  <div class="ov-wrap" id="main-ov" style="background:rgba(18,20,35,0.52); backdrop-filter:blur(7px);">
    <canvas id="main-cv" width="88" height="108"></canvas>
  </div>
</div>

<p class="sec-title">오버레이 스타일 선택</p>
<div class="ov-row">
  <div class="ov-card" id="ov-a" onclick="pickOv('a')">
    <div class="ov-preview">
      <div class="ov-appbg">
        <div class="mb2 w60"></div><div class="mb2 w80"></div>
        <div class="mb2 w45"></div><div class="mb2 w80"></div><div class="mb2 w60"></div>
      </div>
      <div class="ov-layer" style="background:rgba(255,255,255,0.22); backdrop-filter:blur(5px);">
        <canvas class="mini-cv" width="40" height="50"></canvas>
      </div>
    </div>
    <div class="ov-label"><strong>A. 밝은 안개</strong><span>흰 반투명, 낮은 blur<br>앱 색감 살아있음</span></div>
  </div>

  <div class="ov-card" id="ov-b" onclick="pickOv('b')">
    <div class="ov-preview">
      <div class="ov-appbg">
        <div class="mb2 w60"></div><div class="mb2 w80"></div>
        <div class="mb2 w45"></div><div class="mb2 w80"></div><div class="mb2 w60"></div>
      </div>
      <div class="ov-layer" style="background:rgba(8,10,22,0.62); backdrop-filter:blur(9px);">
        <canvas class="mini-cv" width="40" height="50"></canvas>
      </div>
    </div>
    <div class="ov-label"><strong>B. 어두운 포커스</strong><span>어두운 반투명<br>강한 blur</span></div>
  </div>

  <div class="ov-card" id="ov-c" onclick="pickOv('c')">
    <div class="ov-preview">
      <div class="ov-appbg">
        <div class="mb2 w60"></div><div class="mb2 w80"></div>
        <div class="mb2 w45"></div><div class="mb2 w80"></div><div class="mb2 w60"></div>
      </div>
      <div class="ov-layer" style="background:rgba(18,20,35,0.52); backdrop-filter:blur(7px);">
        <canvas class="mini-cv" width="40" height="50"></canvas>
      </div>
    </div>
    <div class="ov-label"><strong>C. 딥 블루</strong><span>짙은 남색 반투명<br>중간 blur</span></div>
  </div>
</div>

<script>
// ── 캐릭터 픽셀 (8col × 10row, 왼쪽 바라보기) ──────────────────────
const B = '#FFB3BA', M = '#FF8FA0', D = '#D96070';
const W = '#FFFFFF', K = '#1C0C10', T = null;

const BODY = [
  [T,T,B,B,B,T,T,T],   // 0 머리 꼭대기
  [T,B,B,B,B,B,T,T],   // 1 머리
  [B,B,W,K,B,B,T,T],   // 2 눈 (왼쪽=얼굴 앞, 오른쪽=뒤)
  [B,B,B,B,B,T,T,T],   // 3 얼굴 아래 (사이드뷰라 오른쪽 좁아짐)
  [T,B,B,B,T,T,T,T],   // 4 턱
  [T,T,B,B,T,T,T,T],   // 5 목
  [T,B,B,B,B,T,T,T],   // 6 몸통
  [T,T,B,B,T,T,T,T],   // 7 하체
];

// 4프레임 걷기 사이클 (앞=col0 방향)
const WALK = [
  [[T,B,T,T,T,T,T,T],[B,T,T,T,T,T,T,T]],  // 0: 왼발 앞
  [[T,B,B,T,T,T,T,T],[T,B,B,T,T,T,T,T]],  // 1: 발 모임
  [[T,T,B,T,T,T,T,T],[T,B,T,B,T,T,T,T]],  // 2: 오른발 앞
  [[T,B,B,T,T,T,T,T],[T,B,B,T,T,T,T,T]],  // 3: 발 모임
];

function drawChar(ctx, ox, oy, sc, frame) {
  const rows = [...BODY, ...WALK[frame & 3]];
  for (let r = 0; r < rows.length; r++) {
    for (let c = 0; c < rows[r].length; c++) {
      const col = rows[r][c];
      if (!col) continue;
      ctx.fillStyle = col;
      ctx.fillRect(ox + c*sc, oy + r*sc, sc, sc);
      if (col === B) {
        ctx.fillStyle = D;
        ctx.fillRect(ox + c*sc, oy + r*sc + sc - 1, sc, 1);
      }
    }
  }
  // 볼 홍조
  ctx.fillStyle = 'rgba(255,100,130,0.35)';
  ctx.beginPath();
  ctx.ellipse(ox + 0.8*sc, oy + 3*sc + sc*0.5, sc*0.9, sc*0.5, 0, 0, Math.PI*2);
  ctx.fill();
}

// ── 사실적인 지구 ────────────────────────────────────────────────────
function drawEarth(ctx, cx, cy, r, angle) {
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.clip();

  // 바다 — 위도별 색상
  const og = ctx.createLinearGradient(cx, cy-r, cx, cy+r);
  og.addColorStop(0.0,  '#0B2D6E');
  og.addColorStop(0.25, '#1565C0');
  og.addColorStop(0.50, '#1E88E5');
  og.addColorStop(0.75, '#1565C0');
  og.addColorStop(1.0,  '#0B2D6E');
  ctx.fillStyle = og;
  ctx.fillRect(cx-r, cy-r, r*2, r*2);

  // 대륙 (회전)
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);

  function S(x, y) { return [x*r, y*r]; }

  function land(pts, fill) {
    ctx.fillStyle = fill;
    ctx.beginPath();
    ctx.moveTo(...S(...pts[0]));
    for (let i = 1; i + 2 < pts.length; i += 3) {
      ctx.bezierCurveTo(...S(...pts[i]), ...S(...pts[i+1]), ...S(...pts[i+2]));
    }
    ctx.closePath();
    ctx.fill();
  }

  // 유라시아
  land([
    [ 0.02,-0.55],
    [ 0.20,-0.68],[ 0.50,-0.62],[ 0.72,-0.42],
    [ 0.82,-0.25],[ 0.78, 0.02],[ 0.60, 0.08],
    [ 0.45, 0.15],[ 0.30, 0.10],[ 0.15, 0.12],
    [ 0.05, 0.12],[-0.05, 0.08],[-0.15,-0.02],
    [-0.18,-0.18],[-0.15,-0.38],[-0.05,-0.48],
    [-0.03,-0.50],[ 0.00,-0.52],[ 0.02,-0.55],
  ], '#43A047');

  // 아프리카
  land([
    [ 0.02,-0.12],
    [ 0.18,-0.14],[ 0.25,-0.05],[ 0.28, 0.12],
    [ 0.30, 0.28],[ 0.24, 0.50],[ 0.12, 0.58],
    [ 0.04, 0.62],[-0.07, 0.55],[-0.12, 0.42],
    [-0.14, 0.28],[-0.12, 0.10],[-0.04,-0.02],
    [ 0.00,-0.08],[ 0.01,-0.10],[ 0.02,-0.12],
  ], '#388E3C');

  // 북아메리카
  land([
    [-0.28,-0.62],
    [-0.10,-0.68],[-0.05,-0.58],[-0.12,-0.45],
    [-0.14,-0.32],[-0.20,-0.20],[-0.28,-0.12],
    [-0.36,-0.05],[-0.42,-0.10],[-0.44,-0.22],
    [-0.48,-0.38],[-0.52,-0.52],[-0.46,-0.62],
    [-0.40,-0.66],[-0.32,-0.65],[-0.28,-0.62],
  ], '#4CAF50');

  // 남아메리카
  land([
    [-0.32, 0.08],
    [-0.22, 0.06],[-0.20, 0.14],[-0.24, 0.28],
    [-0.26, 0.42],[-0.32, 0.58],[-0.40, 0.62],
    [-0.46, 0.58],[-0.48, 0.45],[-0.44, 0.30],
    [-0.40, 0.18],[-0.40, 0.10],[-0.32, 0.08],
  ], '#388E3C');

  // 호주
  land([
    [ 0.44, 0.20],
    [ 0.56, 0.18],[ 0.64, 0.28],[ 0.60, 0.40],
    [ 0.55, 0.48],[ 0.44, 0.50],[ 0.36, 0.44],
    [ 0.30, 0.38],[ 0.32, 0.26],[ 0.44, 0.20],
  ], '#558B2F');

  // 그린란드
  land([
    [-0.18,-0.72],
    [-0.08,-0.75],[ 0.00,-0.70],[-0.04,-0.62],
    [-0.10,-0.60],[-0.20,-0.65],[-0.18,-0.72],
  ], '#C8E6C9');

  // 남극
  ctx.fillStyle = 'rgba(220,240,255,0.82)';
  ctx.beginPath();
  ctx.ellipse(0, r*0.88, r*0.58, r*0.16, 0, 0, Math.PI*2);
  ctx.fill();

  // 북극
  ctx.fillStyle = 'rgba(220,240,255,0.70)';
  ctx.beginPath();
  ctx.ellipse(0, -r*0.84, r*0.38, r*0.12, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.restore(); // 회전 끝

  // 구면 하이라이트
  const shine = ctx.createRadialGradient(cx-r*0.35, cy-r*0.38, 0, cx, cy, r);
  shine.addColorStop(0,    'rgba(255,255,255,0.18)');
  shine.addColorStop(0.50, 'rgba(200,230,255,0.04)');
  shine.addColorStop(1,    'rgba(0,30,100,0.28)');
  ctx.fillStyle = shine;
  ctx.fillRect(cx-r, cy-r, r*2, r*2);

  ctx.restore();

  // 테두리
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(130,200,255,0.45)';
  ctx.lineWidth = 1.2;
  ctx.stroke();
}

// ── 렌더 & 루프 ─────────────────────────────────────────────────────
let angle = 0, tick = 0, wf = 0;

function render(canvas, gr, cs) {
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const cx = canvas.width / 2;
  const cy = canvas.height - gr - 5;
  drawEarth(ctx, cx, cy, gr, angle);
  const charX = cx - 4*cs;
  const charY = cy - gr - 10*cs + cs*1.5;
  drawChar(ctx, charX, charY, cs, wf);
}

function loop() {
  angle -= 0.013;
  tick++;
  if (tick % 9 === 0) wf++;
  render(document.getElementById('main-cv'), 36, 5);
  document.querySelectorAll('.mini-cv').forEach(c => render(c, 16, 2));
  requestAnimationFrame(loop);
}

// ── 오버레이 선택 ────────────────────────────────────────────────────
const OV = {
  a: ['rgba(255,255,255,0.22)', 'blur(5px)'],
  b: ['rgba(8,10,22,0.62)',     'blur(9px)'],
  c: ['rgba(18,20,35,0.52)',    'blur(7px)'],
};
let cur = null;
function pickOv(k) {
  if (cur) document.getElementById('ov-'+cur).classList.remove('selected');
  cur = k;
  document.getElementById('ov-'+k).classList.add('selected');
  const el = document.getElementById('main-ov');
  el.style.background = OV[k][0];
  el.style.backdropFilter = OV[k][1];
  if (window.__recordEvent) window.__recordEvent(k, 'overlay-'+k);
}

loop();
</script>
</body>
</html>
