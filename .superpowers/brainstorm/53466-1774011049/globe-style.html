<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로딩 컴포넌트 스타일</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  font-family: 'Segoe UI', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
  color: #fff;
}
h2 {
  font-size: 1.6rem;
  font-weight: 700;
  margin-bottom: 8px;
  text-align: center;
}
.subtitle {
  color: #aaa;
  font-size: 0.95rem;
  margin-bottom: 40px;
  text-align: center;
}
.cards {
  display: flex;
  gap: 28px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 1000px;
}
.card {
  background: #252540;
  border: 2px solid #3a3a60;
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.2s;
  width: 280px;
}
.card:hover { transform: translateY(-4px); border-color: #6666aa; }
.card.selected { border-color: #8b8bff; box-shadow: 0 0 0 3px rgba(139,139,255,0.3); }
.card-image {
  height: 180px;
  position: relative;
  overflow: hidden;
}
.card-body {
  padding: 16px;
}
.card-body h3 {
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 6px;
  color: #eee;
}
.card-body p {
  font-size: 0.82rem;
  color: #888;
  line-height: 1.4;
}
.demo-bg {
  position: absolute;
  inset: 0;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.mock-row {
  height: 12px;
  border-radius: 6px;
  opacity: 0.5;
}
.mock-row.short { width: 60%; }
.mock-row.medium { width: 80%; }
.mock-row.long { width: 100%; }
.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
canvas {
  display: block;
}
.badge {
  position: absolute;
  top: 10px;
  left: 10px;
  background: rgba(255,255,255,0.15);
  color: #fff;
  font-size: 0.7rem;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  letter-spacing: 0.05em;
}
.select-hint {
  text-align: center;
  margin-top: 32px;
  color: #555;
  font-size: 0.85rem;
}
</style>
</head>
<body>
<h2>로딩 컴포넌트 스타일 선택</h2>
<p class="subtitle">지구본 색감과 오버레이 느낌이 다른 3가지 옵션이에요. 클릭해서 선택해주세요.</p>

<div class="cards">

  <!-- Option A: Ocean Blue -->
  <div class="card" id="card-a" onclick="select('a')">
    <div class="card-image" id="demo-a">
      <div class="demo-bg" id="bg-a">
        <div class="mock-row long" style="background:#4a6fa5"></div>
        <div class="mock-row medium" style="background:#4a6fa5"></div>
        <div class="mock-row short" style="background:#4a6fa5"></div>
        <div class="mock-row long" style="background:#4a6fa5"></div>
        <div class="mock-row medium" style="background:#4a6fa5"></div>
        <div class="mock-row short" style="background:#4a6fa5"></div>
        <div class="mock-row long" style="background:#4a6fa5"></div>
        <div class="mock-row long" style="background:#4a6fa5"></div>
      </div>
      <div class="overlay" style="background: rgba(220,235,255,0.35); backdrop-filter: blur(6px);">
        <canvas id="canvas-a" width="72" height="90"></canvas>
      </div>
      <div class="badge">A</div>
    </div>
    <div class="card-body">
      <h3>오션 블루 🌊</h3>
      <p>파란 바다 지구본 + 밝은 반투명 오버레이<br>낮고 부드러운 blur 효과</p>
    </div>
  </div>

  <!-- Option B: Night Sky -->
  <div class="card" id="card-b" onclick="select('b')">
    <div class="card-image" id="demo-b">
      <div class="demo-bg" id="bg-b">
        <div class="mock-row long" style="background:#5a6f9e"></div>
        <div class="mock-row medium" style="background:#5a6f9e"></div>
        <div class="mock-row short" style="background:#5a6f9e"></div>
        <div class="mock-row long" style="background:#5a6f9e"></div>
        <div class="mock-row medium" style="background:#5a6f9e"></div>
        <div class="mock-row short" style="background:#5a6f9e"></div>
        <div class="mock-row long" style="background:#5a6f9e"></div>
        <div class="mock-row long" style="background:#5a6f9e"></div>
      </div>
      <div class="overlay" style="background: rgba(10,15,40,0.55); backdrop-filter: blur(8px);">
        <canvas id="canvas-b" width="72" height="90"></canvas>
      </div>
      <div class="badge">B</div>
    </div>
    <div class="card-body">
      <h3>나이트 스카이 🌙</h3>
      <p>딥 네이비 지구본 + 어두운 오버레이<br>강한 blur, 집중감 있는 느낌</p>
    </div>
  </div>

  <!-- Option C: Soft Mint -->
  <div class="card" id="card-c" onclick="select('c')">
    <div class="card-image" id="demo-c">
      <div class="demo-bg" id="bg-c">
        <div class="mock-row long" style="background:#3d8c7a"></div>
        <div class="mock-row medium" style="background:#3d8c7a"></div>
        <div class="mock-row short" style="background:#3d8c7a"></div>
        <div class="mock-row long" style="background:#3d8c7a"></div>
        <div class="mock-row medium" style="background:#3d8c7a"></div>
        <div class="mock-row short" style="background:#3d8c7a"></div>
        <div class="mock-row long" style="background:#3d8c7a"></div>
        <div class="mock-row long" style="background:#3d8c7a"></div>
      </div>
      <div class="overlay" style="background: rgba(240,255,250,0.4); backdrop-filter: blur(5px);">
        <canvas id="canvas-c" width="72" height="90"></canvas>
      </div>
      <div class="badge">C</div>
    </div>
    <div class="card-body">
      <h3>소프트 민트 🌿</h3>
      <p>초록빛 지구본 + 밝고 산뜻한 오버레이<br>프로스트 글래스 느낌</p>
    </div>
  </div>

</div>

<p class="select-hint">카드를 클릭하면 선택됩니다. 터미널에서 피드백을 주셔도 돼요!</p>

<script>
// === Pixel Art Character ===
// 8x8 pixel grid, scale=5 → 40x40px sprite area
// Colors per style
const STYLES = {
  a: { ocean: '#1565C0', deep: '#0D47A1', land: '#2E7D32', landAlt: '#388E3C', grid: 'rgba(255,255,255,0.35)', char: '#FF7A2F', charDark: '#CC4A00', overlay: 'rgba(220,235,255,0.3)' },
  b: { ocean: '#0D1B4B', deep: '#07102E', land: '#1A3A5C', landAlt: '#1E4575', grid: 'rgba(100,160,255,0.5)', char: '#FF8C42', charDark: '#D4520A', overlay: null },
  c: { ocean: '#00796B', deep: '#004D40', land: '#33691E', landAlt: '#558B2F', grid: 'rgba(255,255,255,0.3)', char: '#FF7043', charDark: '#BF360C', overlay: null },
};

// Character pixel art (8 cols x 10 rows, each pixel = S units)
// 'o'=orange body, 'w'=white eye, 'd'=dark accent, ' '=transparent
const CHAR_MAP = [
  '  oooo  ',  // 0: head top
  ' oooooo ',  // 1: head
  'oowoowoо',  // 2: face with eyes (w=white)
  'oooooooo',  // 3: face
  ' oooooo ',  // 4: chin
  '  oooo  ',  // 5: torso
];

// Walking frames: leg pixels [col, row, color]
const WALK_FRAMES = [
  // frame 0: legs spread out
  [[1,6,'o'],[2,6,'o'],[5,6,'o'],[6,6,'o'],
   [0,7,'o'],[1,7,'o'],[6,7,'o'],[7,7,'o']],
  // frame 1: legs mid
  [[2,6,'o'],[3,6,'o'],[4,6,'o'],[5,6,'o'],
   [2,7,'o'],[3,7,'o'],[4,7,'o'],[5,7,'o']],
  // frame 2: legs crossed (other side)
  [[2,6,'o'],[3,6,'o'],[4,6,'o'],[5,6,'o'],
   [1,7,'o'],[2,7,'o'],[5,7,'o'],[6,7,'o']],
  // frame 3: mid again
  [[2,6,'o'],[3,6,'o'],[4,6,'o'],[5,6,'o'],
   [2,7,'o'],[3,7,'o'],[4,7,'o'],[5,7,'o']],
];

function drawGlobe(ctx, cx, cy, r, angle, styleKey) {
  const s = STYLES[styleKey];
  ctx.save();

  // Clip to circle
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.clip();

  // Ocean base
  const grad = ctx.createRadialGradient(cx-r*0.3, cy-r*0.3, r*0.1, cx, cy, r);
  grad.addColorStop(0, s.land);
  grad.addColorStop(0.4, s.ocean);
  grad.addColorStop(1, s.deep);
  ctx.fillStyle = grad;
  ctx.fillRect(cx-r, cy-r, r*2, r*2);

  // Rotating grid lines
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle); // counter-clockwise = negative direction
  ctx.strokeStyle = s.grid;
  ctx.lineWidth = 0.8;

  // Latitude lines (4 horizontal ellipses)
  for (let i = -3; i <= 3; i++) {
    const ly = i * (r / 3.5);
    const lrx = Math.sqrt(Math.max(0, r*r - ly*ly));
    ctx.beginPath();
    ctx.ellipse(0, ly, lrx, lrx * 0.25, 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Longitude lines (4 vertical ellipses)
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.ellipse(0, 0, r * 0.25, r, (Math.PI / 4) * i, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.restore();

  // Globe shine
  ctx.save();
  const shine = ctx.createRadialGradient(cx - r*0.4, cy - r*0.4, 0, cx - r*0.2, cy - r*0.2, r*0.7);
  shine.addColorStop(0, 'rgba(255,255,255,0.18)');
  shine.addColorStop(0.5, 'rgba(255,255,255,0.04)');
  shine.addColorStop(1, 'rgba(0,0,0,0.15)');
  ctx.fillStyle = shine;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Border
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.restore();
}

function drawCharacter(ctx, x, y, walkFrame, styleKey) {
  const s = STYLES[styleKey];
  const sc = 4; // scale: each pixel = 4px
  const charW = 8 * sc;

  // Draw static body
  for (let row = 0; row < CHAR_MAP.length; row++) {
    for (let col = 0; col < CHAR_MAP[row].length; col++) {
      const c = CHAR_MAP[row][col];
      if (c === 'o' || c === 'о') { // orange body
        ctx.fillStyle = s.char;
        ctx.fillRect(x + col*sc, y + row*sc, sc, sc);
        // Dark outline on bottom/right pixels
        ctx.fillStyle = s.charDark;
        ctx.fillRect(x + col*sc, y + row*sc + sc-1, sc, 1); // bottom shadow
      } else if (c === 'w') { // white eye
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(x + col*sc, y + row*sc, sc, sc);
        ctx.fillStyle = '#333';
        ctx.fillRect(x + col*sc + 1, y + row*sc + 1, sc-2, sc-2); // pupil
      }
    }
  }

  // Draw walking legs
  const legs = WALK_FRAMES[walkFrame % WALK_FRAMES.length];
  for (const [col, row, c] of legs) {
    if (c === 'o') {
      ctx.fillStyle = s.char;
      ctx.fillRect(x + col*sc, y + row*sc, sc, sc);
      ctx.fillStyle = s.charDark;
      ctx.fillRect(x + col*sc, y + row*sc + sc-1, sc, 1);
    }
  }
}

// Animation loop
let angle = 0;
let walkTick = 0;
let walkFrame = 0;
const CANVASES = ['a', 'b', 'c'];
const GLOBE_R = 26;

function animate() {
  angle -= 0.012; // counter-clockwise
  walkTick++;
  if (walkTick % 14 === 0) walkFrame++;

  CANVASES.forEach(key => {
    const canvas = document.getElementById('canvas-' + key);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    const cx = W / 2;
    const globeY = H / 2 + 8; // globe center slightly lower

    // Draw globe
    drawGlobe(ctx, cx, globeY, GLOBE_R, angle, key);

    // Character positioned on top of globe
    const charScale = 4;
    const charW = 8 * charScale;
    const charH = 8 * charScale; // 10 rows
    const charX = cx - charW / 2;
    const charY = globeY - GLOBE_R - charH + charScale * 2; // sit on globe top

    drawCharacter(ctx, charX, charY, walkFrame, key);
  });

  requestAnimationFrame(animate);
}

// Selection
let selected = null;
function select(choice) {
  if (selected) document.getElementById('card-' + selected).classList.remove('selected');
  selected = choice;
  document.getElementById('card-' + choice).classList.add('selected');

  // Record event
  if (window.__recordEvent) window.__recordEvent(choice, 'Option ' + choice.toUpperCase());
}

animate();
</script>
</body>
</html>
