name: Main Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SKIP_EXTERNAL_INIT: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile app.py server.py recommender.py api/parser.py api/detail_cache.py api/journey.py prompts/builder.py api/visits.py

      - name: Backend regression tests
        run: |
          pytest -q \
            tests/test_accommodation.py \
            tests/test_auth_sessions.py \
            tests/test_auth_routes.py \
            tests/test_billing_checkout.py \
            tests/test_billing_webhook.py \
            tests/test_builder.py \
            tests/test_city_scores.py \
            tests/test_currency.py \
            tests/test_dashboard_api.py \
            tests/test_data_schema.py \
            tests/test_detail_cache.py \
            tests/test_db.py \
            tests/test_db_connection_recovery.py \
            tests/test_db_thread_local.py \
            tests/test_language_policy.py \
            tests/test_hf_client.py \
            tests/test_link_validator.py \
            tests/test_mobile_auth_oauth_payload.py \
            tests/test_rate_limit_storage.py \
            tests/test_rate_limit_entitlements.py \
            tests/test_parser.py \
            tests/test_persona.py \
            tests/test_journey_api.py \
            tests/test_planb.py \
            tests/test_prompts.py \
            tests/test_recommender.py \
            tests/test_schengen_calculator.py \
            tests/test_security_events.py \
            tests/test_server_endpoints.py \
            tests/test_server_startup.py \
            tests/test_sync_nomaddb_csv_to_json.py \
            tests/test_tax_warning.py \
            tests/test_verification_metadata.py \
            tests/test_visa_db.py \
            tests/test_visits_api.py \
            tests/test_mobile_contract_api.py \
            tests/test_mobile_uploads_route.py

      - name: Frontend regression tests
        run: |
          node --test --experimental-strip-types frontend/src/lib/analytics/consent.test.mjs frontend/src/lib/analytics/posthog-config.test.mjs frontend/src/lib/pricing-content.test.mjs frontend/src/lib/legal-content.test.mjs frontend/src/lib/billing-return.test.mjs frontend/src/lib/dashboard-content.test.mjs frontend/src/lib/guide-export.test.mjs
